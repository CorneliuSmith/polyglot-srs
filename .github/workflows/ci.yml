name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is the supported floor (code uses datetime.UTC); 3.12 is the
        # upper end of the range camel-tools supports.
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: polyglot_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      # Drives the real-Postgres integration/RLS tests (skipped if unset).
      INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/polyglot_test
      # Drives the real-Redis rate-limiter tests (skipped if unset).
      REDIS_TEST_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # Lean test subset — heavy NLP backends (spaCy, camel-tools) degrade
          # gracefully and their tests skip, so they aren't needed in CI.
          pip install fastapi "uvicorn[standard]" pydantic pydantic-settings \
            asyncpg PyJWT httpx anthropic redis pymorphy3 cyrtranslit lemminflect \
            nltk numpy scipy stripe ruff pytest pytest-asyncio cffi
      - name: Download NLTK WordNet (English seeder)
        run: python -m nltk.downloader -q wordnet omw-1.4
      - name: Ruff
        run: ruff check backend
      - name: Pytest (unit + integration/RLS)
        run: python -m pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npx tsc -b
      - name: Tests
        run: npx vitest run
