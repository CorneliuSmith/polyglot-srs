<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PolyglotSRS</title>
    <!-- PWA (WP19b): installable to the home screen -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#172554" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Pre-apply the persisted theme before React mounts so a dark-mode
      // user never sees a white flash. Mirrors ThemeApplier's logic.
      try {
        var prefs = JSON.parse(localStorage.getItem('polyglot-prefs') || '{}')
        var theme = (prefs.state && prefs.state.theme) || 'system'
        var dark =
          theme === 'dark' ||
          (theme === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script>
      // Self-heal a broken stylesheet load. A stale service-worker cache after
      // a deploy can leave the app pointing at a CSS bundle that 404s, so it
      // renders as unstyled serif HTML. If OUR OWN css failed to load, drop the
      // service worker + caches and reload once (guarded so it can't loop).
      // Only same-origin sheets are checked — a cross-origin webfont link
      // legitimately exposes no .sheet and must not trigger recovery.
      window.addEventListener('load', function () {
        setTimeout(function () {
          try {
            if (sessionStorage.getItem('polyglot-css-healed')) return
            var origin = location.origin
            var broke = false
            document.querySelectorAll('link[rel="stylesheet"]').forEach(function (l) {
              if (l.href && l.href.indexOf(origin) === 0 && !l.sheet) broke = true
            })
            if (!broke) return
            sessionStorage.setItem('polyglot-css-healed', '1')
            var reload = function () { location.reload() }
            var clearCaches = window.caches
              ? caches.keys().then(function (ks) {
                  return Promise.all(ks.map(function (k) { return caches.delete(k) }))
                })
              : Promise.resolve()
            if (navigator.serviceWorker) {
              navigator.serviceWorker.getRegistrations()
                .then(function (rs) {
                  return Promise.all(rs.map(function (r) { return r.unregister() }))
                })
                .then(function () { return clearCaches })
                .then(reload, reload)
            } else {
              clearCaches.then(reload, reload)
            }
          } catch (e) { /* recovery is best-effort */ }
        }, 2000)
      })
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
